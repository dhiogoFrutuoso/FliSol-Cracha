<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card Customizer</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Playfair+Display:wght@400;700&family=Space+Mono:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Bebas+Neue&family=Josefin+Sans:wght@300;400;700&family=Pacifico&family=Bitter:wght@400;600&family=Rajdhani:wght@400;600&family=Archivo+Black&family=IBM+Plex+Mono:wght@400;600&family=Cinzel:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="wrap">
      <div class="preview-area">
        <div id="card" style="--overlay-opacity: 0">
          <div class="deco" id="deco"></div>
          <div class="deco2" id="deco2"></div>
          <div class="card-top">
            <span class="card-icon" id="cicon">✦</span>
            <span
              class="card-tag"
              id="ctag"
              style="background: rgba(255, 255, 255, 0.2); color: #fff"
              >IFCE</span
            >
          </div>
          <div class="card-bottom">
            <div class="card-name" id="cname" style="color: #fff">Seu Nome</div>
            <div class="card-title" id="ctitle" style="color: #fff">
              Título do Card
            </div>
            <div class="card-sub" id="csub" style="color: #fff">
              subtítulo · detalhes
            </div>
          </div>
        </div>

        <div class="loading-indicator" id="loading-indicator">
          <div class="spinner"></div>
          <span>Carregando imagem...</span>
        </div>

        <p class="preview-label">pré-visualização em tempo real</p>
      </div>

      <div class="sidebar">
        <div class="panel">
          <div class="panel-title">Conteúdo</div>
          <div class="field">
            <label for="f-icon"
              >Ícone / emoji (Pressione win + . para ver os emojis)</label
            ><input type="text" id="f-icon" value="✦" maxlength="4" />
          </div>
          <div class="field">
            <label for="f-tag">Instituição de Ensino ou Empresa</label
            ><input type="text" id="f-tag" value="IFCE" />
          </div>
          <div class="field">
            <label for="f-name">Nome</label
            ><input type="text" id="f-name" value="Seu Nome" />
          </div>
          <div class="field">
            <label for="f-title">Título principal</label
            ><input type="text" id="f-title" value="Título do Card" />
          </div>
          <div class="field">
            <label for="f-sub">Subtítulo</label
            ><input type="text" id="f-sub" value="subtítulo · detalhes" />
          </div>
        </div>

        <div class="panel">
          <div class="panel-title">Fundo</div>
          <div class="bg-section-tabs">
            <button
              class="bg-section-btn active"
              onclick="switchBgSection('cores', this)"
            >
              🎨 Cores
            </button>
            <button
              class="bg-section-btn"
              onclick="switchBgSection('imagens', this)"
            >
              🖼 Imagens
            </button>
          </div>

          <div class="bg-section visible" id="section-cores">
            <div class="tab-row" id="color-tab-row"></div>
            <div class="color-row" id="color-row"></div>
          </div>

          <div class="bg-section" id="section-imagens">
            <div class="tab-row" id="img-tab-row"></div>
            <div class="thumb-grid" id="thumb-grid"></div>
            <div class="slider-row">
              <label for="overlay-slider">Escurecimento</label>
              <input
                type="range"
                id="overlay-slider"
                min="0"
                max="85"
                value="45"
                step="5"
              />
              <span class="slider-val" id="overlay-val">45%</span>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-title">Fonte</div>
          <div class="font-row" id="font-row"></div>
        </div>

        <div class="panel">
          <div class="panel-title">Proporção</div>
          <div class="layout-row">
            <div class="layout-btn active" onclick="setLayout('wide', this)">
              Wide
            </div>
            <div class="layout-btn" onclick="setLayout('square', this)">
              Square
            </div>
            <div class="layout-btn" onclick="setLayout('tall', this)">Tall</div>
          </div>
        </div>

        <div class="dl-wrap">
          <button class="dl-btn" id="dl-btn" onclick="downloadCard()">
            Baixar como imagem ↓
          </button>
        </div>
      </div>
    </div>

      const FONTS = [
        { name: "DM Sans", label: "Sans" },
        { name: "Playfair Display", label: "Playfair" },
        { name: "Space Mono", label: "Mono" },
        { name: "Cormorant Garamond", label: "Elegant" },
        { name: "Bebas Neue", label: "Bebas" },
        { name: "Josefin Sans", label: "Josefin" },
        { name: "Pacifico", label: "Pacifico" },
        { name: "Bitter", label: "Bitter" },
        { name: "Rajdhani", label: "Rajdhani" },
        { name: "Archivo Black", label: "Archivo" },
        { name: "IBM Plex Mono", label: "IBM Mono" },
        { name: "Cinzel", label: "Cinzel" },
      ];

      const INPUT_TO_CARD_ELEMENT = {
        "f-icon": "cicon",
        "f-tag": "ctag",
        "f-name": "cname",
        "f-title": "ctitle",
        "f-sub": "csub",
      };

      const LAYOUT_SIZES = {
        wide: { width: "420px", height: "265px" },
        square: { width: "300px", height: "300px" },
        tall: { width: "265px", height: "420px" },
      };

      let activeBgSection = "cores";
      let activeColorTab = "classicas";
      let activeImageTab = "natureza";
      let imageLoading = false;

      const cardEl = document.getElementById("card");
      const decoEl = document.getElementById("deco");
      const deco2El = document.getElementById("deco2");
      const colorRow = document.getElementById("color-row");
      const colorTabRow = document.getElementById("color-tab-row");
      const thumbGrid = document.getElementById("thumb-grid");
      const imgTabRow = document.getElementById("img-tab-row");
      const fontRow = document.getElementById("font-row");
      const overlaySlider = document.getElementById("overlay-slider");
      const overlayVal = document.getElementById("overlay-val");
      const loadingIndicator = document.getElementById("loading-indicator");
      const dlBtn = document.getElementById("dl-btn");

      function setLoadingState(isLoading) {
        imageLoading = isLoading;
        loadingIndicator.classList.toggle("visible", isLoading);
        dlBtn.disabled = isLoading;
      }

      function applyImageToCard(url) {
        cardEl.style.backgroundImage = `url('${url}')`;
        cardEl.style.backgroundColor = "#111";
        cardEl.classList.add("mode-image");
        const opacity = (overlaySlider.value / 100).toFixed(2);
        cardEl.style.setProperty("--overlay-opacity", opacity);
        document.getElementById("ctag").style.background =
          "rgba(255,255,255,0.2)";
      }

      function selectImage(img, thumbWrapEl) {
        thumbGrid
          .querySelectorAll(".thumb-wrap")
          .forEach((w) => w.classList.remove("active"));
        thumbWrapEl.classList.add("active");
        applyImageToCard(img.url);
      }

      function applyColorPalette(palette) {
        cardEl.style.backgroundImage = "none";
        cardEl.style.backgroundColor = palette.bg;
        cardEl.style.setProperty("--overlay-opacity", "0");
        cardEl.classList.remove("mode-image");
        decoEl.style.background = palette.d;
        deco2El.style.background = palette.d2;
        document.getElementById("ctag").style.background =
          "rgba(255,255,255,0.15)";
      }

      function renderColorSwatches(categoryId) {
        colorRow.innerHTML = "";
        const category = PALETTE_CATEGORIES.find((c) => c.id === categoryId);
        if (!category) return;
        category.palettes.forEach((palette, index) => {
          const wrap = document.createElement("div");
          wrap.className = "swatch-wrap";
          const tip = document.createElement("span");
          tip.className = "swatch-tip";
          tip.textContent = palette.name;
          const swatch = document.createElement("div");
          swatch.className = "color-swatch" + (index === 0 ? " active" : "");
          swatch.style.background = palette.bg;
          swatch.addEventListener("click", () => {
            colorRow
              .querySelectorAll(".color-swatch")
              .forEach((s) => s.classList.remove("active"));
            swatch.classList.add("active");
            applyColorPalette(palette);
          });
          wrap.appendChild(tip);
          wrap.appendChild(swatch);
          colorRow.appendChild(wrap);
        });
        applyColorPalette(category.palettes[0]);
      }

      function buildColorTabs() {
        PALETTE_CATEGORIES.forEach((category) => {
          const btn = document.createElement("button");
          btn.className =
            "tab-btn" + (category.id === activeColorTab ? " active" : "");
          btn.textContent = category.label;
          btn.addEventListener("click", () => {
            activeColorTab = category.id;
            colorTabRow
              .querySelectorAll(".tab-btn")
              .forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            renderColorSwatches(category.id);
          });
          colorTabRow.appendChild(btn);
        });
      }

      function getAllImageCategories() {
        return [
          ...IMAGE_CATEGORIES,
          { id: "geek", label: "Mundo Geek", images: GEEK_IMAGES },
        ];
      }

      function renderThumbs(categoryId) {
        thumbGrid.innerHTML = "";
        const category = getAllImageCategories().find(
          (c) => c.id === categoryId,
        );
        if (!category) return;
        category.images.forEach((img, index) => {
          const wrap = document.createElement("div");
          wrap.className = "thumb-wrap" + (index === 0 ? " active" : "");
          const thumb = document.createElement("div");
          thumb.className = "thumb-img";
          thumb.style.backgroundImage = `url('${img.thumbUrl}')`;
          const label = document.createElement("div");
          label.className = "thumb-label";
          label.textContent = img.name;
          wrap.addEventListener("click", () => selectImage(img, wrap));
          wrap.appendChild(thumb);
          wrap.appendChild(label);
          thumbGrid.appendChild(wrap);
        });
        selectImage(category.images[0], thumbGrid.querySelector(".thumb-wrap"));
      }

      function buildImageTabs() {
        getAllImageCategories().forEach((category) => {
          const btn = document.createElement("button");
          btn.className =
            "tab-btn" + (category.id === activeImageTab ? " active" : "");
          btn.textContent = category.label;
          btn.addEventListener("click", () => {
            activeImageTab = category.id;
            imgTabRow
              .querySelectorAll(".tab-btn")
              .forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            renderThumbs(category.id);
          });
          imgTabRow.appendChild(btn);
        });
      }

      function bindOverlaySlider() {
        overlaySlider.addEventListener("input", () => {
          const opacity = (overlaySlider.value / 100).toFixed(2);
          cardEl.style.setProperty("--overlay-opacity", opacity);
          overlayVal.textContent = `${overlaySlider.value}%`;
        });
      }

      function switchBgSection(sectionId, btnClicked) {
        activeBgSection = sectionId;
        document
          .querySelectorAll(".bg-section-btn")
          .forEach((b) => b.classList.remove("active"));
        btnClicked.classList.add("active");
        document
          .querySelectorAll(".bg-section")
          .forEach((s) => s.classList.remove("visible"));
        document
          .getElementById(`section-${sectionId}`)
          .classList.add("visible");
        if (sectionId === "cores") {
          renderColorSwatches(activeColorTab);
        } else {
          renderThumbs(activeImageTab);
        }
      }

      function buildFontRow() {
        FONTS.forEach((font) => {
          const btn = document.createElement("div");
          btn.className =
            "font-btn" + (font.name === "DM Sans" ? " active" : "");
          btn.style.fontFamily = font.name;
          btn.textContent = font.label;
          btn.title = font.name;
          btn.addEventListener("click", () => {
            fontRow
              .querySelectorAll(".font-btn")
              .forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            cardEl.style.fontFamily = font.name;
          });
          fontRow.appendChild(btn);
        });
      }

      function bindInputs() {
        Object.entries(INPUT_TO_CARD_ELEMENT).forEach(([inputId, cardElId]) => {
          const inputEl = document.getElementById(inputId);
          const targetEl = document.getElementById(cardElId);
          inputEl.addEventListener("input", () => {
            targetEl.textContent = inputEl.value;
          });
        });
      }

      function setLayout(type, btnClicked) {
        document
          .querySelectorAll(".layout-btn")
          .forEach((b) => b.classList.remove("active"));
        btnClicked.classList.add("active");
        const size = LAYOUT_SIZES[type];
        if (size) {
          cardEl.style.width = size.width;
          cardEl.style.height = size.height;
        }
      }

      function downloadCard() {
        if (imageLoading) return;
        html2canvas(cardEl, {
          scale: 3,
          useCORS: true,
          allowTaint: true,
          backgroundColor: null,
          imageTimeout: 10000,
        }).then((canvas) => {
          const link = document.createElement("a");
          link.download = "meu-card.png";
          link.href = canvas.toDataURL("image/png");
          link.click();
        });
      }

      buildColorTabs();
      renderColorSwatches(activeColorTab);
      buildImageTabs();
      buildFontRow();
      bindInputs();
      bindOverlaySlider();
    </script>
  </body>
